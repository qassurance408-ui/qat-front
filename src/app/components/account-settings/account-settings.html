<div class="fixed inset-0 z-50 flex items-start justify-center pt-[10vh]"
     (click)="backdropClick($event)">
  <div class="bg-white rounded shadow-xl border border-slate-200 w-full max-w-md mx-4 overflow-hidden"
       (click)="$event.stopPropagation()">

    <!-- Header -->
    <div class="flex items-center justify-between px-5 py-4 border-b border-slate-100">
      <h2 class="text-base font-semibold text-slate-800">Account Settings</h2>
      <button (click)="close()"
              class="text-slate-400 hover:text-slate-600 transition-colors p-1 rounded hover:bg-slate-100">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>

    <div class="px-5 py-4 space-y-6">

      <!-- Avatar -->
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-2">Profile Picture</label>
        <div class="flex items-center gap-4">
          <div class="relative w-16 h-16 rounded-full overflow-hidden bg-slate-100 border-2 border-slate-200 shrink-0">
            <img *ngIf="previewUrl; else initialFallback"
                 [src]="previewUrl"
                 class="w-full h-full object-cover"
                 (error)="previewUrl = null">
            <ng-template #initialFallback>
              <div class="w-full h-full flex items-center justify-center text-lg font-semibold text-slate-400">
                {{ initial }}
              </div>
            </ng-template>
          </div>
          <div class="flex flex-col gap-1.5">
            <label class="cursor-pointer text-sm font-medium text-indigo-600 hover:text-indigo-700 transition-colors">
              <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)">
              Upload Photo
            </label>
            <button *ngIf="currentUser?.avatarUrl || uploadedFile"
                    (click)="removeAvatar()"
                    class="text-sm text-left text-rose-500 hover:text-rose-700 transition-colors">
              Remove
            </button>
          </div>
        </div>
        <p *ngIf="avatarError" class="mt-1.5 text-xs text-rose-500">{{ avatarError }}</p>
      </div>

      <!-- Display Name -->
      <div>
        <label for="displayName" class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Display Name</label>
        <div class="flex gap-2">
          <input id="displayName" type="text"
                 [(ngModel)]="displayName"
                 maxlength="50"
                 class="flex-1 px-3 py-2 text-sm border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors"
                 placeholder="Your display name">
          <button (click)="saveDisplayName()"
                  [disabled]="savingDisplayName || !displayName.trim() || displayName.trim() === currentUser?.displayName"
                  class="px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors shrink-0">
            {{ savingDisplayName ? 'Saving...' : 'Save' }}
          </button>
        </div>
        <p *ngIf="displayNameError" class="mt-1.5 text-xs text-rose-500">{{ displayNameError }}</p>
        <p *ngIf="displayNameSuccess" class="mt-1.5 text-xs text-emerald-600">{{ displayNameSuccess }}</p>
      </div>

      <!-- Change Password -->
      <div>
        <label class="text-xs font-semibold text-slate-500 uppercase tracking-wider block mb-1.5">Change Password</label>
        <div class="space-y-2.5">
          <input type="password" [(ngModel)]="oldPassword" placeholder="Current password"
                 class="w-full px-3 py-2 text-sm border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors">
          <input type="password" [(ngModel)]="newPassword" placeholder="New password (min 8 characters)"
                 class="w-full px-3 py-2 text-sm border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors">
          <input type="password" [(ngModel)]="confirmPassword" placeholder="Confirm new password"
                 class="w-full px-3 py-2 text-sm border border-slate-300 rounded focus:outline-none focus:ring-2 focus:ring-indigo-500/20 focus:border-indigo-500 transition-colors">
          <button (click)="changePassword()"
                  [disabled]="savingPassword || !oldPassword || !newPassword || !confirmPassword"
                  class="w-full px-4 py-2 text-sm font-medium text-white bg-indigo-600 rounded hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed transition-colors">
            {{ savingPassword ? 'Saving...' : 'Update Password' }}
          </button>
          <p *ngIf="passwordError" class="text-xs text-rose-500">{{ passwordError }}</p>
          <p *ngIf="passwordSuccess" class="text-xs text-emerald-600">{{ passwordSuccess }}</p>
        </div>
      </div>

    </div>

  </div>
</div>
