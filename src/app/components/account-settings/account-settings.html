<div class="min-h-screen bg-gray-50">
  <!-- Header -->
  <header class="bg-white border-b border-gray-200 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 sm:px-6 py-3 flex items-center gap-3">
      <a routerLink="/"
         class="text-gray-400 hover:text-gray-600 transition-colors p-1 -ml-1 rounded hover:bg-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
        </svg>
      </a>
      <h1 class="text-base font-semibold text-gray-900">Account Settings</h1>
    </div>
  </header>

  <main class="max-w-4xl mx-auto px-4 sm:px-6 py-6 sm:py-8">
    <div class="bg-white rounded shadow-sm border border-gray-200">
      <div class="flex flex-col md:flex-row gap-8 p-6 sm:p-8">

        <!-- ── Left: Avatar ──────────────────────────────────────────────── -->
        <div class="flex flex-col items-center gap-3 shrink-0">
          <div class="w-28 h-28 rounded-full overflow-hidden bg-slate-100 border-4 border-slate-200">
            <img *ngIf="previewUrl; else initialFallback"
                 [src]="previewUrl"
                 class="w-full h-full object-cover"
                 (error)="previewUrl = null">
            <ng-template #initialFallback>
              <div class="w-full h-full flex items-center justify-center text-3xl font-semibold text-slate-400">
                {{ initial }}
              </div>
            </ng-template>
          </div>

          <label class="cursor-pointer text-sm font-medium text-gray-700 hover:text-gray-900 transition-colors">
            <input type="file" accept="image/*" class="hidden" (change)="onFileSelected($event)">
            Upload Photo
          </label>
          <button *ngIf="currentUser?.avatarUrl"
                  (click)="removeAvatar()"
                  [disabled]="removingAvatar"
                  class="text-sm text-rose-500 hover:text-rose-700 transition-colors disabled:opacity-50">
            {{ removingAvatar ? 'Removing...' : 'Remove' }}
          </button>
          <p *ngIf="avatarError" class="text-xs text-rose-500 max-w-28 text-center">{{ avatarError }}</p>
        </div>

        <!-- ── Right: Profile info ───────────────────────────────────────── -->
        <div class="flex-1 min-w-0 space-y-6">

          <!-- Display Name -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Display Name</label>
            <div *ngIf="!editingName" class="flex items-center gap-2">
              <span class="text-base font-medium text-gray-900">{{ currentUser?.displayName }}</span>
              <button (click)="startEditingName()"
                      class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded hover:bg-gray-100">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                  <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
                </svg>
              </button>
            </div>
            <div *ngIf="editingName" class="flex items-center gap-2">
              <input type="text"
                     [(ngModel)]="nameBuffer"
                     maxlength="50"
                     (keyup.enter)="saveDisplayName()"
                     (keyup.escape)="cancelEditingName()"
                     class="flex-1 max-w-xs border border-slate-300 rounded px-3 py-1.5 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-slate-300 focus:border-slate-400 transition-colors"
                     autofocus>
              <button (click)="saveDisplayName()"
                      [disabled]="savingName || !nameBuffer.trim()"
                      class="px-3 py-1.5 text-sm font-medium text-white bg-slate-700 rounded hover:bg-slate-800 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors">
                {{ savingName ? 'Saving...' : 'Save' }}
              </button>
              <button (click)="cancelEditingName()"
                      class="px-3 py-1.5 text-sm font-medium text-gray-700 border border-slate-300 rounded hover:bg-gray-50 transition-colors">
                Cancel
              </button>
            </div>
            <p class="text-sm text-gray-500 mt-1">{{ currentUser?.email }}</p>
            <p *ngIf="nameError" class="text-xs text-rose-500 mt-1">{{ nameError }}</p>
          </div>

          <hr class="border-gray-200">

          <!-- Password -->
          <div>
            <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Password</label>

            <button *ngIf="!showPasswordForm"
                    (click)="togglePasswordForm()"
                    class="px-4 py-2 text-sm font-medium text-white bg-slate-700 rounded hover:bg-slate-800 transition-colors">
              Update Password
            </button>

            <div *ngIf="showPasswordForm" class="space-y-3 max-w-sm">
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Current Password</label>
                <div class="relative">
                  <input [type]="showOld ? 'text' : 'password'" [(ngModel)]="oldPassword"
                         class="w-full border border-slate-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-slate-300 focus:border-slate-400 transition-colors pr-10">
                  <button type="button" (click)="showOld = !showOld"
                          class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <svg *ngIf="!showOld" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg *ngIf="showOld" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">New Password</label>
                <div class="relative">
                  <input [type]="showNew ? 'text' : 'password'" [(ngModel)]="newPassword"
                         class="w-full border border-slate-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-slate-300 focus:border-slate-400 transition-colors pr-10">
                  <button type="button" (click)="showNew = !showNew"
                          class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <svg *ngIf="!showNew" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg *ngIf="showNew" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Confirm New Password</label>
                <div class="relative">
                  <input [type]="showConfirm ? 'text' : 'password'" [(ngModel)]="confirmPassword"
                         class="w-full border border-slate-300 rounded px-3 py-2 text-sm bg-white focus:outline-none focus:ring-1 focus:ring-slate-300 focus:border-slate-400 transition-colors pr-10">
                  <button type="button" (click)="showConfirm = !showConfirm"
                          class="absolute inset-y-0 right-0 pr-3 flex items-center text-gray-400 hover:text-gray-600">
                    <svg *ngIf="!showConfirm" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                    <svg *ngIf="showConfirm" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                      <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>
                    </svg>
                  </button>
                </div>
              </div>
              <div class="flex items-center gap-2">
                <button (click)="changePassword()"
                        [disabled]="savingPassword || !oldPassword || !newPassword || !confirmPassword"
                        class="px-4 py-2 text-sm font-medium text-white bg-slate-700 rounded hover:bg-slate-800 disabled:bg-slate-400 disabled:cursor-not-allowed transition-colors">
                  {{ savingPassword ? 'Saving...' : 'Save' }}
                </button>
                <button (click)="togglePasswordForm()"
                        class="px-4 py-2 text-sm font-medium text-gray-700 border border-slate-300 rounded hover:bg-gray-50 transition-colors">
                  Cancel
                </button>
              </div>
              <p *ngIf="passwordError" class="text-xs text-rose-500">{{ passwordError }}</p>
              <p *ngIf="passwordSuccess" class="text-xs text-emerald-600">{{ passwordSuccess }}</p>
            </div>
          </div>

        </div>
      </div>
    </div>
  </main>
</div>
