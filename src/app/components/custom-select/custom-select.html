<div class="relative select-none" tabindex="0">
  <!-- Trigger -->
  <div
    class="flex items-center justify-between gap-1 w-full border border-slate-300 rounded px-2 sm:px-3 py-2 text-xs sm:text-sm bg-white cursor-pointer hover:border-slate-400 transition-colors"
    (click)="toggleOpen()"
  >
    <span class="truncate {{ value ? 'text-gray-900' : 'text-gray-400' }}">
      {{ displayText }}
    </span>
    <svg
      class="w-3 h-3 sm:w-3.5 sm:h-3.5 text-gray-500 flex-shrink-0 transition-transform {{ isOpen ? 'rotate-180' : '' }}"
      xmlns="http://www.w3.org/2000/svg"
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      stroke-width="2"
      stroke-linecap="round"
      stroke-linejoin="round"
    >
      <polyline points="6 9 12 15 18 9"></polyline>
    </svg>
  </div>

  <!-- Dropdown -->
  <div
    *ngIf="isOpen"
    class="absolute top-full left-0 right-0 z-50 mt-1 bg-white border border-slate-200 rounded shadow-lg max-h-60 overflow-y-auto"
  >
    <!-- Placeholder/empty option -->
    <div
      *ngIf="allowEmpty && placeholder"
      class="px-3 py-2 text-xs sm:text-sm text-gray-400 cursor-pointer hover:bg-slate-100 transition-colors"
      (click)="select('')"
    >
      {{ placeholder }}
    </div>

    <!-- Disabled first option (like "Select...") -->
    <div
      *ngIf="disabledValue !== null && disabledValue !== undefined"
      class="px-3 py-2 text-xs sm:text-sm text-gray-400 bg-gray-50 cursor-default"
    >
      {{ disabledLabel || 'Select...' }}
    </div>

    <!-- Options -->
    <div
      *ngFor="let opt of options; let i = index"
      class="px-3 py-2 text-xs sm:text-sm text-gray-700 cursor-pointer hover:bg-slate-100 transition-colors {{ opt === value ? 'bg-slate-50 font-medium text-slate-900' : '' }}"
      (click)="select(opt)"
    >
      {{ labels ? labels[i] : opt }}
    </div>
  </div>
</div>
