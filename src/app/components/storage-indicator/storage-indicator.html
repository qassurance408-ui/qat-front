<div class="flex items-center gap-1.5 sm:gap-2 text-xs text-gray-500" [title]="formatBytes(usage.used) + ' used of ' + formatBytes(usage.total)">
  <span class="hidden sm:inline">Storage:</span>
  <div class="w-14 sm:w-20 h-2 bg-gray-200 rounded-full overflow-hidden">
    <div
      class="h-full rounded-full transition-all duration-500 {{ barColor }}"
      [style.width.%]="Math.min(usage.percent, 100)"
    ></div>
  </div>
  <span class="hidden sm:inline">{{ formatBytes(usage.used) }} / {{ formatBytes(usage.total) }}</span>
  <span class="sm:hidden">{{ formatBytes(usage.used) }}</span>
  <span *ngIf="usage.percent >= 80" class="text-red-500 font-medium">⚠</span>
</div>
